name: Deploy Docs

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - run: composer install --prefer-dist --no-interaction --no-progress --no-dev

      - run: php bin/build-docs-site.php
        env:
          DOCS_CNAME: ${{ secrets.DOCS_CNAME }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

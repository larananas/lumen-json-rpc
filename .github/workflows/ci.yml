name: CI

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ runner.os }}-

      - run: composer validate --strict --no-check-version
      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: composer audit --abandoned=report
      - run: php bin/verify-package.php
      - run: php bin/lint-syntax.php
      - run: vendor/bin/phpstan analyse --memory-limit=512M --no-progress

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4"]

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ runner.os }}-${{ matrix.php }}-

      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: vendor/bin/phpunit

  coverage:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: xdebug

      - uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-8.3-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ runner.os }}-8.3-

      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml
      - run: php bin/check-coverage.php
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  mutation:
    runs-on: ubuntu-latest
    needs: coverage

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: xdebug

      - uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-8.3-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ runner.os }}-8.3-

      - run: composer install --prefer-dist --no-interaction --no-progress
      - name: Run Infection
        run: vendor/bin/infection --threads=max --min-msi=80 --min-covered-msi=85 --no-progress
